# PRD P0：每周一 00:00 UTC（北京时间 08:00）生成周报；支持手动补跑
name: Weekly Report

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: report-pipeline
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate weekly report
        run: npm run weekly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}

      - name: Commit report and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "report: weekly $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      # PRD P0 告警：任一步骤失败自动开 Issue
      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failure: weekly report ${new Date().toISOString().slice(0, 10)}`,
              labels: ['pipeline-failure'],
              body: [
                '周报流水线运行失败，请人工排查。',
                '',
                `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- 触发方式: ${context.eventName}`,
                '',
                '排查后可在 Actions 页面通过 workflow_dispatch 手动补跑。',
              ].join('\n'),
            });
