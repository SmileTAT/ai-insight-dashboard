# PRD P0：每月 1 日 00:00 UTC 生成上月月报；支持手动补跑（可传 REPORT_MONTH）
name: Monthly Report

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      report_month:
        description: '补跑月份（YYYY-MM），留空为上一个自然月'
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: report-pipeline
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate monthly report
        run: npm run monthly
        env:
          REPORT_MONTH: ${{ inputs.report_month }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_STRONG_MODEL: ${{ vars.LLM_STRONG_MODEL }}

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "report: monthly $(date -u +%Y-%m)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failure: monthly report ${new Date().toISOString().slice(0, 7)}`,
              labels: ['pipeline-failure'],
              body: [
                '月报流水线运行失败，请人工排查。',
                '',
                `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- 触发方式: ${context.eventName}`,
                '',
                '排查后可在 Actions 页面通过 workflow_dispatch 手动补跑（支持 report_month 参数）。',
              ].join('\n'),
            });
